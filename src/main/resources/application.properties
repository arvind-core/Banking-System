spring.application.name=Banking-System

# DataBase Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/banking_system
spring.datasource.username=root
spring.datasource.password=Asdf@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql= true
spring.jpa.open-in-view=false

# Email Configuration (Gmail SMTP example — use Mailtrap for dev)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio SMS Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:your-account-sid}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your-auth-token}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}

# Telegram Bot Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN:your-bot-token}